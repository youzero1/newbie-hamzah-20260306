version: '3.8'

services:
  newbie:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: newbie-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=./data/newbie.sqlite
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    volumes:
      - newbie-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  newbie-data:
    driver: local
